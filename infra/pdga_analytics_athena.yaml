AWSTemplateFormatVersion: "2010-09-09"
Description: PDGA analytics Athena infrastructure (results bucket + workgroup + Glue database)

Parameters:
  ProjectName:
    Type: String
    Default: pdga
    Description: Project identifier used in resource names

  AnalyticsDatabaseName:
    Type: String
    Default: pdga_analytics
    Description: Glue/Athena database name for scored and reporting tables

Resources:
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ProjectName}-athena-results-${AWS::AccountId}-${AWS::Region}"

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      VersioningConfiguration:
        Status: Enabled

      Tags:
        - Key: project
          Value: !Ref ProjectName
        - Key: layer
          Value: analytics

  AthenaResultsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AthenaResultsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "${AthenaResultsBucket.Arn}"
              - !Sub "${AthenaResultsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  AnalyticsDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AnalyticsDatabaseName
        Description: PDGA scored fact and dashboard reporting database

  AnalyticsAthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ProjectName}-analytics"
      Description: Athena workgroup for PDGA analytics and reporting refreshes
      RecursiveDeleteOption: false
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AthenaResultsBucket}/query-results/"
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
        BytesScannedCutoffPerQuery: 107374182400

Outputs:
  AthenaResultsBucketName:
    Value: !Ref AthenaResultsBucket
    Description: S3 bucket for Athena query result files

  AthenaResultsOutputLocation:
    Value: !Sub "s3://${AthenaResultsBucket}/query-results/"
    Description: Athena query result output location

  AnalyticsDatabaseName:
    Value: !Ref AnalyticsDatabaseName
    Description: Glue/Athena database for scored and reporting tables

  AnalyticsWorkGroupName:
    Value: !Ref AnalyticsAthenaWorkGroup
    Description: Athena workgroup name
