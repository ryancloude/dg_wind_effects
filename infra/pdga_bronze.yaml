AWSTemplateFormatVersion: "2010-09-09"
Description: PDGA bronze layer infrastructure (S3 raw HTML + DynamoDB index)

Parameters:
  ProjectName:
    Type: String
    Default: pdga
    Description: Project identifier used in resource names

Resources:
  BronzeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Bucket names must be globally unique, so include account + region.
      BucketName: !Sub "${ProjectName}-bronze-${AWS::AccountId}-${AWS::Region}"

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      VersioningConfiguration:
        Status: Enabled

      Tags:
        - Key: project
          Value: !Ref ProjectName
        - Key: layer
          Value: bronze

  BronzeBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BronzeBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Require HTTPS/TLS for any access
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "${BronzeBucket.Arn}"
              - !Sub "${BronzeBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  EventIndexTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${ProjectName}-event-index"
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S

      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      SSESpecification:
        SSEEnabled: true

      Tags:
        - Key: project
          Value: !Ref ProjectName
        - Key: layer
          Value: bronze

Outputs:
  BronzeBucketName:
    Value: !Ref BronzeBucket
    Description: S3 bucket for bronze raw HTML

  EventIndexTableName:
    Value: !Ref EventIndexTable
    Description: DynamoDB table for event discovery/index